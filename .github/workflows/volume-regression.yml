name: Volume regression

# Daily integrity gate — catches thin seasons, ghost refs, and empty matrix baselines
# before they reach production. Mirrors local `npm run check:volume`.
on:
  schedule:
    # 09:00 America/Denver (MDT/MST) ≈ 15:00 UTC during DST, 16:00 UTC in winter.
    - cron: "0 15 * * *"
  workflow_dispatch: {}

concurrency:
  group: volume-regression
  cancel-in-progress: false

jobs:
  volume:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Volume regression check
        run: npm run check:volume
