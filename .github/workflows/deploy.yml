name: Deploy to Cloudflare

# Auto-deploy the site whenever main changes. Mirrors the local `npm run deploy`
# (next build + opennextjs-cloudflare build + deploy). Requires two repo secrets:
#   - CLOUDFLARE_API_TOKEN  (Workers Scripts: Edit + Account/Workers KV as needed)
#   - CLOUDFLARE_ACCOUNT_ID
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys at once; cancel superseded in-progress runs.
concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
