name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refactor safety checks
        run: npm run check:refactor-safety

      - name: Client import boundary check
        run: npm run check:client-imports

      - name: Merge conflict marker check
        run: npm run check:no-conflict-markers

      - name: Typecheck
        run: npm run typecheck

      - name: Regenerate overview snapshot
        run: npx tsx scripts/build-overview-snapshot.ts

      - name: Generated artifact freshness
        run: npm run check:artifact-freshness
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}

      - name: Validation artifact freshness
        run: npm run check:validation-freshness
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}

      - name: Coupled test change gate
        run: npm run check:coupled-tests
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}

      - name: Volume regression gate
        run: npm run check:volume

      - name: Generate deploy data artifacts
        run: npm run check:deploy

      - name: CSS syntax check
        run: npm run check:css-syntax

      - name: Next.js production build
        run: npm run build:next

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Design ship audit
        run: npm run audit:design-ship
        env:
          THEME_MATRIX_BASE_URL: http://127.0.0.1:3099

      - name: Design token parity audit
        run: npm run audit:design-tokens

      - name: Clinical card consistency audit
        run: npm run audit:card-consistency

      - name: Metric semantics audit
        run: npm run audit:metric-semantics

      - name: Em dash copy audit
        run: npm run check:no-em-dashes

      - name: Terminal integrity audit
        run: npm run audit:terminal-integrity

      - name: Insight-first audit
        run: npm run audit:insight-first

      - name: Overlay portal audit
        run: npm run audit:overlay-portals

      - name: Integrity monitor audit
        run: npm run audit:integrity-monitor

      - name: Unit tests
        run: npm run test

      - name: Honesty audit
        run: npm run honesty-audit
