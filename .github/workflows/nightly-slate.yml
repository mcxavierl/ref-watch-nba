name: Nightly slate refresh

# Requires repository secret ODDS_API_KEY for sportsbook line fetch.

on:
  schedule:
    # 9:05 AM America/Toronto ≈ 13:05 UTC (EDT) / 14:05 UTC (EST)
    - cron: "5 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh assignments and overview snapshot
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: npm run nightly-slate

      - name: Commit refreshed slate data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/assignments.json data/nhl/assignments.json data/nfl/assignments.json data/epl/assignments.json data/laliga/assignments.json data/wnba/assignments.json public/data/wnba/assignments.json data/overview-snapshot.json public/data/overview/snapshot.json data/overview-insights.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No assignment changes to commit."
            exit 0
          fi
          git commit -m "chore: nightly slate refresh"
          git push
